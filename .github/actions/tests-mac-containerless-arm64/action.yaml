name: CLI container-less on Mac ARM64
description: Run Kantra CLI tests in containerless mode on macOS ARM64

inputs:
  tier:
    description: |
      Test TIER name
    required: false
    default: TIER0
  test_path:
    description: |
      If set, run only this test path (e.g. tests/analysis/java). Overrides tier.
    required: false
    default: ""
  maven_token:
    description: |
      Token for public github maven repo access
    required: false
    default: ""

runs:
  using: "composite"
  steps:
  - uses: actions/checkout@v4
    with:
      submodules: recursive
  - uses: actions/setup-java@v4
    with:
      distribution: 'microsoft'
      java-version: '21'
  - uses: actions/setup-python@v5
    with:
      python-version: '3.12'
  - name: Setup Homebrew
    uses: Homebrew/actions/setup-homebrew@master
  - name: Install required tools
    shell: bash
    run: |
      ulimit -n unlimited
      brew install findutils gsed

  - name: Get kantra bundle
    uses: actions/download-artifact@v4
    with:
      name: kantra-bundle-arm64
      path: /Users/runner/.kantra

  - name: Configure Test Environment
    shell: bash
    run: |
      chmod +x /Users/runner/.kantra/darwin-kantra
      ln -s /Users/runner/.kantra /Users/runner/.config/.kantra
      mkdir ${{ github.workspace }}/report
    working-directory: ${{ github.workspace }}
  - name: Install test dependencies
    shell: bash
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Run tests
    uses: nick-fields/retry@v3
    with:
      timeout_minutes: 80
      max_attempts: 2
      shell: bash
      command: |
        export PATH=$(brew --prefix)/opt/findutils/libexec/gnubin:$PATH
        export KANTRA_CLI_PATH=/Users/runner/.kantra/darwin-kantra
        export REPORT_OUTPUT_PATH=${{ github.workspace }}/report
        export PROJECT_PATH=${{ github.workspace }}
        export GIT_PASSWORD=${{ inputs.maven_token }}
        export GIT_USERNAME=konveyor-read-only-bot
        export RUN_LOCAL_MODE=true

        if [ -n "${{ inputs.test_path }}" ]; then
          pytest -s ${{ inputs.test_path }}
        elif [ "${{ inputs.tier }}" = "TIER0" ]; then
          pytest -s tests/analysis/java/test_tier0.py
        else
          pytest -s tests/
        fi

  - name: Save analysis output
    uses: actions/upload-artifact@v4
    if: always()
    with:
      name: kantra-outputs-mac-containerless
      path: ${{ github.workspace }}/report
